<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Proyectos Emblemáticos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background-color: var(--surface-container-low); }
        .page-header {
            padding-top: var(--spacing-16);
            padding-bottom: var(--spacing-8);
            background-color: var(--surface-container-low);
        }
    </style>
</head>
<body>
    <site-header></site-header>

    <main>
        <section class="page-header contact-section fade-up">
            <div class="container contact-grid">
                <div class="contact-info">
                    <span class="technical-label">OFICINA CENTRAL // DATOS DE CONTACTO</span>
                    <h1 class="display-lg">Iniciemos <br>el Plano.</h1>
                    <p class="body-lg" style="margin-top:var(--spacing-4); margin-bottom:var(--spacing-5);">Nuestro equipo de ingenieros estructurales y arquitectos directores está listo para analizar las especificaciones de su próximo gran desarrollo.</p>
                    
                    <div style="margin-bottom:var(--spacing-4);">
                        <h4 class="technical-label">Sede</h4>
                        <p class="body-md text-variant">Torre Apex, Piso 80<br>Distrito Financiero, 10001</p>
                    </div>
                </div>
                <div class="contact-form-container surface-lowest">
                    <form class="contact-form">
                        <div class="form-group">
                            <label class="technical-label" for="name">NOMBRE DEL CLIENTE</label>
                            <input type="text" id="name" placeholder="Ej. Corporación Apex">
                        </div>
                        <div class="form-group">
                            <label class="technical-label" for="email">CORREO DE CONTACTO</label>
                            <input type="email" id="email" placeholder="contacto@empresa.com">
                        </div>
                        <div class="form-group">
                            <label class="technical-label" for="project">DESCRIPCIÓN DEL PROYECTO</label>
                            <textarea id="project" rows="5" placeholder="Requerimientos iniciales, presupuesto estimado y escala esperada..."></textarea>
                        </div>
                        <button type="button" class="btn btn-primary btn-block">Enviar Especificaciones</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <site-footer></site-footer>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'quote') {
                const items = window.CartManager.getItems();
                const textarea = document.getElementById('project');
                if (items && items.length > 0 && textarea) {
                    let text = "SOLICITUD DE COTIZACIÓN PARA PROYECTOS:\n\n";
                    items.forEach((item, index) => {
                        text += `${index + 1}. [REF: ${item.sku}] - ${item.name}\n`;
                    });
                    text += "\n---\nPor favor, ingresen requerimientos adicionales o presupuesto estimado aquí:\n";
                    textarea.value = text;
                }
            }
            
            // Si el form se manda vacío en cotización, vaciamos el carrito al éxito (mock)
            const btnSubmit = document.querySelector('.contact-form .btn-primary');
            if (btnSubmit) {
                btnSubmit.addEventListener('click', () => {
                   if(window.CartManager.getItems().length > 0) {
                        setTimeout(() => {
                           window.CartManager.clear();
                        }, 2000); // al mismo tiempo que el exito
                   }
                });
            }
        });
    </script>
</body>
</html>
