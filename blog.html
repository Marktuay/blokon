<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Blokon</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <site-header></site-header>
    <main>
        <section class="page-header" style="padding-top: var(--spacing-16); padding-bottom: var(--spacing-8); background-color: var(--surface-container-low);">
            <div class="container blog-header">
                <h1 class="display-md blog-title">Blog</h1>
                <div class="blog-controls">
                    <input id="blog-search" type="text" placeholder="Buscar en el blog...">
                    <select id="blog-category-filter">
                        <option value="">Todas las categorías</option>
                    </select>
                </div>
            </div>
            <div id="blog-posts-container" class="projects-grid"></div>
            <div id="blog-pagination" style="display:flex; gap:0.5rem; justify-content:center; margin:2rem 0;"></div>
        </section>
    </main>
    <site-footer></site-footer>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
