<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyectos - Proyectos Emblemáticos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .page-header {
            padding-top: var(--spacing-16);
            padding-bottom: var(--spacing-8);
            background-color: var(--surface-container-low);
        }
    </style>
</head>
<body>
    <site-header></site-header>

    <main>
        <section class="page-header" style="padding-top: var(--spacing-16); padding-bottom: var(--spacing-8); background-color: var(--surface-container-low);">
            <div class="container section-header">
                <h1 class="display-lg fade-up">Portafolio.</h1>
                <p class="body-lg text-variant fade-up" style="transition-delay:0.1s;">Explora nuestra colección completa de obras infraestructurales. Cada proyecto es un testamento a la durabilidad y visión.</p>
            </div>
        </section>

        <section class="projects-section" style="padding: var(--spacing-12) 0; background: var(--surface);">
            <div class="container" style="margin-bottom: var(--spacing-5);">
                <div id="project-filters" class="action-chips fade-up" style="justify-content: center;">
                    <!-- Filtros generados por JS -->
                </div>
            </div>
            <div id="wc-products-container" class="container projects-grid">
                <p class="body-md text-variant fade-up">Cargando portafolio completo desde WooCommerce...</p>
            </div>
        </section>
    </main>

    <site-footer></site-footer>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
