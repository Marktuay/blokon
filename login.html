<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - Proyectos Emblemáticos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-section {
            padding: var(--spacing-16) 0;
            background-color: var(--surface-container-low);
            min-height: 80vh;
            display: flex;
            align-items: center;
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-8);
            background: var(--surface-container-lowest);
            border-radius: var(--radius-sm);
            box-shadow: var(--ambient-shadow);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .auth-grid {
                grid-template-columns: 1fr;
            }
        }

        .auth-panel {
            padding: var(--spacing-8) var(--spacing-5);
        }

        .auth-panel:first-child {
            border-right: 1px solid var(--surface-container-highest);
        }

        .auth-title {
            margin-bottom: var(--spacing-5);
            color: var(--primary);
        }

        .form-message {
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: var(--spacing-4);
            font-size: 0.9rem;
            display: none;
        }

        .form-message.error {
            background-color: #ffebee;
            color: #c62828;
            display: block;
        }

        .form-message.success {
            background-color: #e8f5e9;
            color: #2e7d32;
            display: block;
        }
    </style>
</head>
<body>
    <site-header></site-header>

    <main class="auth-section">
        <div class="container relative">
            <div class="auth-grid fade-up">
                
                <!-- LOGIN FORM -->
                <div class="auth-panel">
                    <h2 class="auth-title">Ya tengo cuenta</h2>
                    <div id="login-msg" class="form-message"></div>
                    <form id="login-form">
                        <div class="form-group">
                            <label class="technical-label" for="login-email">Correo Electrónico</label>
                            <input type="email" id="login-email" required>
                        </div>
                        <div class="form-group">
                            <label class="technical-label" for="login-pass">Contraseña</label>
                            <input type="password" id="login-pass" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">INGRESAR</button>
                        <a href="#" class="body-md text-variant mt-3" style="display:inline-block; margin-top:1rem;">¿Olvidaste tu contraseña?</a>
                    </form>
                </div>

                <!-- REGISTER FORM -->
                <div class="auth-panel" style="background-color: var(--surface-container-low);">
                    <h2 class="auth-title">Crear Cuenta</h2>
                    <div id="reg-msg" class="form-message"></div>
                    <form id="reg-form">
                        <div class="form-group">
                            <label class="technical-label" for="reg-name">Nombre Completo</label>
                            <input type="text" id="reg-name" required>
                        </div>
                        <div class="form-group">
                            <label class="technical-label" for="reg-email">Correo Electrónico</label>
                            <input type="email" id="reg-email" required>
                        </div>
                        <div class="form-group">
                            <label class="technical-label" for="reg-pass">Contraseña</label>
                            <input type="password" id="reg-pass" required>
                        </div>
                        <p class="body-md text-variant mt-3" style="margin-bottom: var(--spacing-4);">Tus datos personales se utilizarán para mejorar tu experiencia y gestionar pedidos corporativos.</p>
                        <button type="submit" class="btn btn-secondary btn-block">REGISTRARSE</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

    <site-footer></site-footer>
    <script src="js/auth.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar si ya está logged
            if (window.AuthManager && window.AuthManager.getUser()) {
                window.location.href = 'mi-cuenta.html';
                return;
            }

            // Animación
            setTimeout(() => {
                const el = document.querySelector('.fade-up');
                if(el) el.classList.add('visible');
            }, 100);

            // Logins
            const loginForm = document.getElementById('login-form');
            const loginMsg = document.getElementById('login-msg');

            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = document.getElementById('login-email').value;
                const pass = document.getElementById('login-pass').value;

                const result = window.AuthManager.login(email, pass);
                if (result.success) {
                    window.location.href = 'mi-cuenta.html';
                } else {
                    loginMsg.className = 'form-message error';
                    loginMsg.textContent = result.message;
                }
            });

            // Registro
            const regForm = document.getElementById('reg-form');
            const regMsg = document.getElementById('reg-msg');

            regForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const name = document.getElementById('reg-name').value;
                const email = document.getElementById('reg-email').value;
                const pass = document.getElementById('reg-pass').value;

                const result = window.AuthManager.register(name, email, pass);
                if (result.success) {
                    window.location.href = 'mi-cuenta.html?welcome=1';
                } else {
                    regMsg.className = 'form-message error';
                    regMsg.textContent = result.message;
                }
            });
        });
    </script>
</body>
</html>
